<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结算页面</title>
    <link rel="stylesheet" href="./style2.css">
</head>
<body >
    <div class="wrapper"></div>
    <div class="summaryContainer">
        <div class="textTitle">
            <img src="./picture/firework_sign.png" alt="">
            <span>我的游戏报告</span>
            <img src="./picture/firework_sign.png" alt="">
        </div>
        <div class="summaryContent">
            <div class="information">
                <div class="avatar">
                    <img src="./picture/avatar-female.jpg" alt="">
                </div>
                <div class="playerName">
                    <p>玩家姓名</p>
                </div>
                <div class="signature">
                    <p>玩家签名拉拉拉拉啊啦啦啦</p>
                </div>
            </div>
            <div class="textContent">
                <p class="greeting">
                    亲爱的玩家，马年大吉！<br>感谢您在新春佳节参与这个马年新春小游戏。<br>在本次游戏中，您凭借出色的表现，
                </p>
                <div class="contentDisplay">
                    <p class="content honor">一共收获了 <span class="titleCount">0</span> 个荣誉称号，
                    每一个称号都是您努力与实力的最好证明。</p>
                    <p class="content card">同时，您在游戏里共收集到 <span class="cardCount">0</span> 张精美新春卡片，</p>
                    <p class="content money">累计获得游戏金币 <span class="moneyCount">0</span>，收获满满，福气满满！</p>
                </div>
                <div class="greeting">
                    你的最终评分是：<span class="scoreCount"><strong>0</strong></span>
                    <br>
                    愿您在新的一年里龙马精神、万事顺意、平安喜乐、心想事成！
                </div>
                
            </div>
            
        </div>

        <div>
            <a href="./index.html" class="backButton">返回</a>
        </div>
        
    </div>

    <script src="./summary.js"></script>
</body>
</html>
